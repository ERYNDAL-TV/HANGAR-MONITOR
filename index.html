<script>
    const firebaseConfig = {
      apiKey: "AIzaSyAv9-oAYmG8tM24g-oVFluXFc7SIhtSfag",
      authDomain: "hangar-ejecutivo.firebaseapp.com",
      databaseURL: "https://hangar-ejecutivo-default-rtdb.firebaseio.com/",
      projectId: "hangar-ejecutivo",
      storageBucket: "hangar-ejecutivo.firebasestorage.app",
      messagingSenderId: "344290123510",
      appId: "1:344290123510:web:f41fd77de0980fbdd5d6d7",
      measurementId: "G-17ZBG6VN2R"
    };

    try {
      firebase.initializeApp(firebaseConfig);
    } catch (e) {
      console.warn("Firebase ya inicializado o error:", e);
    }
    
    const dbRef = firebase.database().ref('hangar_sc_offset');

    // CONFIGURACIÓN OFICIAL CORRECTA (185 min total)
    const PREP_DURATION = 120 * 60 * 1000;   // 120 min (Fase Roja)
    const ACTIVE_DURATION = 60 * 60 * 1000;  // 60 min (Fase Verde)
    const HAZARD_DURATION = 5 * 60 * 1000;   // 5 min (Evacuación / Gracia)
    const TOTAL_CYCLE = PREP_DURATION + ACTIVE_DURATION + HAZARD_DURATION; // 185 min (3h 05m)

    const NUM_LEDS = 5;
    const PREP_STEP = PREP_DURATION / NUM_LEDS;     // 24 min por luz en fase roja
    const ACTIVE_STEP = ACTIVE_DURATION / NUM_LEDS; // 12 min por luz en fase verde
    const WARN_THRESHOLD = 15 * 60 * 1000;

    let adminCustomOffset = 0;
    let fetchedClockOffset = 0; 
    let firebaseLoaded = false;

    let isAdminUnlocked = localStorage.getItem('hangar_sc_admin') === 'true';
    let audioEnabled = localStorage.getItem('hangar_sc_audio') === 'true';
    let notifEnabled = localStorage.getItem('hangar_sc_notif') === 'true';
    let currentPhase = ''; 

    const phaseBadge = document.getElementById('phaseBadge');
    const phaseTitle = document.getElementById('phaseTitle');
    const phaseDesc = document.getElementById('phaseDesc');
    const nextPhaseText = document.getElementById('nextPhaseText');
    const clockBox = document.getElementById('clockBox');
    const clockLabel = document.getElementById('clockLabel');
    const timerDigits = document.getElementById('timerDigits');
    const targetTimeLabel = document.getElementById('targetTimeLabel');
    const targetTime = document.getElementById('targetTime');
    const progressStepText = document.getElementById('progressStepText');
    const progressPercentText = document.getElementById('progressPercentText');
    const progressBarFill = document.getElementById('progressBarFill');
    const scheduleGrid = document.getElementById('scheduleGrid');
    const audioToggleBtn = document.getElementById('audioToggleBtn');
    const notifToggleBtn = document.getElementById('notifToggleBtn');
    const userTimezoneEl = document.getElementById('userTimezone');

    try {
      userTimezoneEl.textContent = Intl.DateTimeFormat().resolvedOptions().timeZone;
    } catch(e) {}

    dbRef.on('value', (snapshot) => {
      firebaseLoaded = true;
      const val = snapshot.val();
      adminCustomOffset = (val !== null) ? val : 0;
      updateHangarState();
    }, (error) => {
      console.warn("Aviso de Firebase (usando modo local):", error);
      if (!firebaseLoaded) {
        adminCustomOffset = 0;
        updateHangarState();
      }
    });

    setTimeout(() => {
      if (!firebaseLoaded) {
        console.warn("Timeout de Firebase. Forzando inicio local...");
        updateHangarState();
      }
    }, 1500);

    function updateNotifButtonUI() {
      if (notifEnabled) {
        notifToggleBtn.className = 'btn btn-audio active';
        notifToggleBtn.textContent = '🔔 Notificaciones Push: ON';
      } else {
        notifToggleBtn.className = 'btn btn-audio';
        notifToggleBtn.textContent = '🔕 Notificaciones Push: OFF';
      }
    }

    async function requestDesktopNotification() {
      if (!('Notification' in window)) { notifEnabled = false; updateNotifButtonUI(); return; }
      if (Notification.permission === 'granted') { notifEnabled = true; }
      else if (Notification.permission !== 'denied') {
        const permission = await Notification.requestPermission();
        notifEnabled = (permission === 'granted');
      }
      localStorage.setItem('hangar_sc_notif', notifEnabled);
      updateNotifButtonUI();
    }

    function sendDesktopNotification(title, body) {
      if (!notifEnabled || !('Notification' in window) || Notification.permission !== 'granted') return;
      try { new Notification(title, { body: body }); } catch(e) {}
    }

    notifToggleBtn.addEventListener('click', async () => {
      if (!notifEnabled) await requestDesktopNotification();
      else { notifEnabled = false; localStorage.setItem('hangar_sc_notif', 'false'); updateNotifButtonUI(); }
    });
    updateNotifButtonUI();

    let audioCtx = null;
    function initAudioContext() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playSound(type) {
      if (!audioEnabled) return;
      initAudioContext();
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      if (type === 'light') {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(587.33, now);
        osc.frequency.exponentialRampToValueAtTime(880, now + 0.15);
        gain.gain.setValueAtTime(0.25, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(now); osc.stop(now + 0.35);
      } else if (type === 'open') {
        [523.25, 659.25, 783.99, 1046.50].forEach((freq, idx) => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.frequency.setValueAtTime(freq, now + idx * 0.08);
          gain.gain.setValueAtTime(0.2, now + idx * 0.08);
          gain.gain.exponentialRampToValueAtTime(0.001, now + idx * 0.08 + 0.3);
          osc.connect(gain); gain.connect(audioCtx.destination);
          osc.start(now + idx * 0.08); osc.stop(now + idx * 0.08 + 0.3);
        });
      }
    }

    function speakText(text) {
      if (!audioEnabled) return;
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'es-ES';
        utterance.rate = 0.95;
        window.speechSynthesis.speak(utterance);
      }
    }

    function updateAudioButtonUI() {
      if (audioEnabled) {
        audioToggleBtn.className = 'btn btn-audio active';
        audioToggleBtn.textContent = '🔔 Alertas Sonoras: ON';
      } else {
        audioToggleBtn.className = 'btn btn-audio';
        audioToggleBtn.textContent = '🔕 Alertas Sonoras: OFF';
      }
    }

    audioToggleBtn.addEventListener('click', () => {
      audioEnabled = !audioEnabled;
      localStorage.setItem('hangar_sc_audio', audioEnabled);
      updateAudioButtonUI();
      if (audioEnabled) { initAudioContext(); playSound('light'); speakText('Alertas activadas'); }
    });
    updateAudioButtonUI();

    function updateHangarState() {
      const trueNow = Date.now() + fetchedClockOffset;
      const nowAdjusted = trueNow + adminCustomOffset;
      const cycleElapsed = nowAdjusted % TOTAL_CYCLE;

      if (cycleElapsed < PREP_DURATION) {
        const timeLeft = PREP_DURATION - cycleElapsed;
        const formattedTime = formatHHMMSS(timeLeft);
        const percent = Math.floor((cycleElapsed / PREP_DURATION) * 100);

        phaseBadge.className = 'phase-badge prep';
        phaseTitle.textContent = (timeLeft <= WARN_THRESHOLD) ? 'PRÓXIMO A ABRIRSE' : 'FASE ROJA (CARGANDO)';
        phaseDesc.textContent = 'Hangar Cerrado · Carga de sistemas (120 min)';
        nextPhaseText.textContent = 'Siguiente: FASE VERDE (Abierto 60 min)';

        clockBox.className = 'clock-box';
        clockLabel.textContent = 'TIEMPO HASTA APERTURA';
        timerDigits.textContent = formattedTime;
        targetTimeLabel.textContent = '⏰ Abre a las';
        targetTime.textContent = getTargetWallTime(timeLeft, nowAdjusted);

        const nextLightMs = PREP_STEP - (cycleElapsed % PREP_STEP);
        progressStepText.textContent = `Próxima luz verde en: ${formatHHMMSS(nextLightMs)}`;
        progressPercentText.textContent = `Progreso: ${percent}%`;
        progressBarFill.style.width = `${percent}%`;
        progressBarFill.style.background = 'var(--red-main)';

        updateLedsDetailed(cycleElapsed);
        currentPhase = 'PREP';

      } else if (cycleElapsed < PREP_DURATION + ACTIVE_DURATION) {
        if (currentPhase !== 'ACTIVE' && currentPhase !== '') {
          playSound('open');
          speakText('Apertura de hangar iniciada.');
          sendDesktopNotification('🚀 Hangar Abierto', '¡Acceso concedido!');
        }

        const activeElapsed = cycleElapsed - PREP_DURATION;
        const timeLeft = ACTIVE_DURATION - activeElapsed;
        const formattedTime = formatHHMMSS(timeLeft);
        const percent = Math.floor((activeElapsed / ACTIVE_DURATION) * 100);

        phaseBadge.className = 'phase-badge active';
        phaseTitle.textContent = 'FASE VERDE (ABIERTO)';
        phaseDesc.textContent = 'Hangar Abierto · Tiempo activo disponible';
        nextPhaseText.textContent = 'Siguiente: EVACUACIÓN (5 min)';

        clockBox.className = 'clock-box active-mode';
        clockLabel.textContent = 'TIEMPO HASTA CIERRE';
        timerDigits.textContent = formattedTime;
        targetTimeLabel.textContent = '⏰ Cierra a las';
        targetTime.textContent = getTargetWallTime(timeLeft, nowAdjusted);

        const nextLightOffMs = ACTIVE_STEP - (activeElapsed % ACTIVE_STEP);
        progressStepText.textContent = `Siguiente luz se apaga en: ${formatHHMMSS(nextLightOffMs)}`;
        progressPercentText.textContent = `Consumido: ${percent}%`;
        progressBarFill.style.width = `${percent}%`;
        progressBarFill.style.background = 'var(--green-main)';

        updateLedsDetailed(cycleElapsed);
        currentPhase = 'ACTIVE';

      } else {
        const hazardElapsed = cycleElapsed - (PREP_DURATION + ACTIVE_DURATION);
        const timeLeft = HAZARD_DURATION - hazardElapsed;
        const formattedTime = formatHHMMSS(timeLeft);
        const percent = Math.floor((hazardElapsed / HAZARD_DURATION) * 100);

        phaseBadge.className = 'phase-badge hazard';
        phaseTitle.textContent = 'PERÍODO DE GRACIA / GAS';
        phaseDesc.textContent = '¡EVACUACIÓN! Cierre completo';
        nextPhaseText.textContent = 'Siguiente: REINICIO DE CICLO';

        clockBox.className = 'clock-box hazard-mode';
        clockLabel.textContent = 'BLOQUEO EN';
        timerDigits.textContent = formattedTime;
        targetTimeLabel.textContent = '⚠️ Bloqueo a las';
        targetTime.textContent = getTargetWallTime(timeLeft, nowAdjusted);

        progressStepText.textContent = '¡Evacuar el hangar de inmediato!';
        progressPercentText.textContent = `Evacuación: ${percent}%`;
        progressBarFill.style.width = `${percent}%`;
        progressBarFill.style.background = 'var(--hazard-main)';

        updateLedsDetailed(cycleElapsed);
        currentPhase = 'HAZARD';
      }

      updateSchedule(nowAdjusted, cycleElapsed);
    }

    function updateLedsDetailed(cycleElapsed) {
      for (let i = 1; i <= NUM_LEDS; i++) {
        const item = document.getElementById(`ledItem${i}`);
        const statusEl = document.getElementById(`led${i}Status`);
        const countdownEl = document.getElementById(`led${i}Countdown`);
        const calc = getLightData(i, cycleElapsed);

        if (calc.state === 'GREEN') { item.className = 'led-item green'; statusEl.textContent = 'ACTIVO'; }
        else if (calc.state === 'PENDING') { item.className = 'led-item red'; statusEl.textContent = 'PENDIENTE'; }
        else if (calc.state === 'OFF') { item.className = 'led-item off'; statusEl.textContent = 'CONSUMIDO'; }
        else if (calc.state === 'HAZARD') { item.className = 'led-item hazard'; statusEl.textContent = 'PELIGRO'; }

        countdownEl.textContent = formatHHMMSS(calc.timeToNext);
      }
    }

    function getLightData(i, cycleElapsed) {
      const hazardStartTime = PREP_DURATION + ACTIVE_DURATION;
      const cycleEnd = TOTAL_CYCLE;

      let state = 'PENDING';
      let nextMilestone = 0;

      if (cycleElapsed < PREP_DURATION) {
        // FASE ROJA: Las luces se encienden de 1 a 5 progresivamente
        const prepTurnGreenTime = i * PREP_STEP;
        if (cycleElapsed >= prepTurnGreenTime) {
          state = 'GREEN';
          nextMilestone = PREP_DURATION;
        } else {
          state = 'PENDING';
          nextMilestone = prepTurnGreenTime;
        }
      } else if (cycleElapsed < hazardStartTime) {
        // FASE VERDE (ACTIVA): Las luces se apagan de 5 a 1 (Luz 1 es la última en apagarse)
        const activeElapsed = cycleElapsed - PREP_DURATION;
        const activeRemaining = ACTIVE_DURATION - activeElapsed;
        
        // Invertimos el orden para que la luz i=1 corresponda al último bloque (últimos 12 min)
        const reverseIndex = NUM_LEDS - i; // 4, 3, 2, 1, 0
        const lightOffThreshold = reverseIndex * ACTIVE_STEP;

        if (activeElapsed >= lightOffThreshold) {
          state = 'GREEN';
          nextMilestone = PREP_DURATION + ((reverseIndex + 1) * ACTIVE_STEP);
          if (nextMilestone > hazardStartTime) nextMilestone = hazardStartTime;
        } else {
          state = 'OFF';
          nextMilestone = PREP_DURATION + lightOffThreshold;
        }
      } else {
        // FASE DE GRACIA / PELIGRO
        state = 'HAZARD';
        nextMilestone = cycleEnd;
      }

      let timeToNext = nextMilestone - cycleElapsed;
      if (timeToNext <= 0) timeToNext = 1000;
      return { state, timeToNext };
    }

    function updateSchedule(nowAdjusted, cycleElapsed) {
      const currentCycleStart = nowAdjusted - cycleElapsed; 
      let firstFutureOpen = currentCycleStart + PREP_DURATION;
      if (cycleElapsed >= PREP_DURATION) firstFutureOpen += TOTAL_CYCLE;

      let html = '';
      const todayDate = new Date(nowAdjusted).getDate();

      for (let i = 0; i < 4; i++) {
        const openMs = firstFutureOpen + (i * TOTAL_CYCLE);
        const closeMs = openMs + ACTIVE_DURATION;
        const msUntil = openMs - nowAdjusted;
        const openDate = new Date(openMs);
        const closeDate = new Date(closeMs);

        const openStr = openDate.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const closeStr = closeDate.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const isTomorrow = openDate.getDate() !== todayDate;
        const dateTag = isTomorrow ? `<span class="schedule-date-badge">MAÑANA</span>` : `<span class="schedule-date-badge" style="background:rgba(16,185,129,0.15); color:var(--green-main);">HOY</span>`;

        const hoursUntil = Math.floor(msUntil / (1000 * 60 * 60));
        const minsUntil = Math.floor((msUntil % (1000 * 60 * 60)) / (1000 * 60));

        html += `
          <div class="schedule-card">
            <div class="schedule-header">
              <span class="schedule-tag">${i === 0 ? 'PRÓXIMA APERTURA' : `APERTURA +${i + 1}`}</span>
              ${dateTag}
            </div>
            <div class="schedule-window">${openStr} - ${closeStr}</div>
            <div class="schedule-eta">⏳ En ${hoursUntil}h ${minsUntil}m aprox.</div>
          </div>
        `;
      }
      scheduleGrid.innerHTML = html;
    }

    function formatHHMMSS(ms) {
      const totalSec = Math.max(0, Math.floor(ms / 1000));
      return `${Math.floor(totalSec / 3600).toString().padStart(2, '0')}:${Math.floor((totalSec % 3600) / 60).toString().padStart(2, '0')}:${(totalSec % 60).toString().padStart(2, '0')}`;
    }

    function getTargetWallTime(msRemaining, nowAdjusted) {
      return new Date(nowAdjusted + msRemaining).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function adjustOffset(ms) {
      adminCustomOffset += ms;
      dbRef.set(adminCustomOffset).catch(err => console.log("Escritura local/bloqueada:", err));
    }

    const toggleAdminBtn = document.getElementById('toggleAdminBtn');
    const adminPanel = document.getElementById('adminPanel');

    if (isAdminUnlocked) adminPanel.classList.add('active');

    toggleAdminBtn.addEventListener('click', () => {
      if (!isAdminUnlocked) {
        const pass = prompt("Introduce la clave de Administrador:");
        if (pass === "achupirla") {
          isAdminUnlocked = true;
          localStorage.setItem('hangar_sc_admin', 'true');
          adminPanel.classList.add('active');
        } else if (pass !== null) alert("Clave incorrecta.");
      } else {
        isAdminUnlocked = false;
        localStorage.setItem('hangar_sc_admin', 'false');
        adminPanel.classList.remove('active');
      }
    });

    document.getElementById('manualSyncBtn').addEventListener('click', () => {
      const phaseInput = prompt("1 = FASE ROJA (120 min)\n2 = FASE VERDE (60 min)\n3 = PERÍODO GRACIA / PELIGRO (5 min)", "1");
      if (!phaseInput) return;
      const timeInput = prompt("Introduce el tiempo restante de la fase (HH:MM:SS):", "01:50:00");
      if (!timeInput) return;
      const parts = timeInput.trim().split(':');
      let totalMs = 0;
      if (parts.length === 3) totalMs = ((parseInt(parts[0], 10) * 3600) + (parseInt(parts[1], 10) * 60) + parseInt(parts[2], 10)) * 1000;
      
      if (!isNaN(totalMs) && totalMs >= 0) {
        let targetElapsed = 0;
        if (phaseInput.trim() === "1") targetElapsed = PREP_DURATION - totalMs;
        else if (phaseInput.trim() === "2") targetElapsed = (PREP_DURATION + ACTIVE_DURATION) - totalMs;
        else if (phaseInput.trim() === "3") targetElapsed = TOTAL_CYCLE - totalMs;

        const trueNow = Date.now() + fetchedClockOffset;
        const currentElapsed = trueNow % TOTAL_CYCLE;
        const newOffset = targetElapsed - currentElapsed;
        dbRef.set(newOffset).catch(err => console.log("Escritura bloqueada:", err));
        alert("¡Sincronización procesada!");
      }
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      dbRef.set(0).catch(err => console.log("Escritura bloqueada:", err));
      alert('Sincronización restablecida.');
    });

    setInterval(updateHangarState, 1000);
  </script>
